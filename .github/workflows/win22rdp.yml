name: Windows 2022 RDP Serveo

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:
    - name: Enable RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name fDenyTSConnections -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    - name: Set Password
      run: |
        net user runneradmin "Password123!"

    - name: Start Serveo Tunnel
      run: |
        ssh -T -o StrictHostKeyChecking=no -R 0:localhost:3389 serveo.net

    - name: Keep Alive
      run: |
        for ($i=0; $i -lt 360; $i++) { Start-Sleep -Seconds 60 }
