name: XFCE Remote

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - uses: actions/checkout@v4

    - name: Install XFCE + XRDP
      run: |
        sudo apt update
        sudo apt install -y xfce4 xfce4-goodies xrdp curl unzip

    - name: Configure Desktop
      run: |
        echo xfce4-session > ~/.xsession

    - name: Set runner password
      run: |
        echo "runner:runner" | sudo chpasswd

    - name: Start XRDP
      run: |
        sudo systemctl enable xrdp
        sudo systemctl restart xrdp

    - name: Install RustDesk
      run: |
        wget https://github.com/rustdesk/rustdesk/releases/download/1.4.6/rustdesk-1.4.6-x86_64.deb
        sudo apt install -y ./rustdesk-1.4.6-x86_64.deb

    - name: Start RustDesk Server
      run: |
        wget https://github.com/rustdesk/rustdesk-server/releases/latest/download/rustdesk-server-linux-amd64.zip
        unzip rustdesk-server-linux-amd64.zip
        cd amd64
        ./hbbs &
        ./hbbr &

    - name: Setup Tailscale
      uses: tailscale/github-action@v2
      with:
        authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

    - name: Show Connection Info
      run: |
        echo "Tailscale IP:"
        tailscale ip
        echo "RDP login:"
        echo "username: runner"
        echo "password: runner"

    - name: Keep Runner Alive
      run: |
        echo "Runner ready for remote desktop"
        sleep 21600
